name: Build and Release

on:
  push:
    tags:
      - 'V*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o ai_debate-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - uses: softprops/action-gh-release@v2
        with:
          files: ai_debate-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          generate_release_notes: true
